<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameCube CSS Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="scene">
    <div class="stage-shadow"></div>

    <section class="console" aria-label="Nintendo GameCube CSS art">
      <div class="handle" aria-hidden="true"></div>

      <div class="shell">
        <div class="shell-sheen" aria-hidden="true"></div>
        <div class="shell-rib shell-rib-left" aria-hidden="true"></div>
        <div class="brand">Nintendo</div>

        <div class="outline" aria-hidden="true">
          <div class="outline-top"></div>
          <div class="outline-left"></div>
          <div class="outline-right"></div>
          <div class="outline-bottom"></div>
          <div class="outline-power-pocket"></div>
         
          <div class="outline-reset-pocket"></div>
          <div class="outline-open-pocket"></div>
          <div class="disc-notch"></div>
        </div>

        <div class="button button-power"></div>
        <div class="outline-power1-pocket"></div>
  
                    <div class="curved-text2">
  <span style="transform: rotate(10deg)">P</span>
  <span style="transform: rotate(17deg)">O</span>
  <span style="transform: rotate(27deg)">W</span>
  <span style="transform: rotate(36deg)">E</span>
  <span style="transform: rotate(43deg)">R</span>
</div>

        <div class="disc">
          <div class="disc-logo-top">NINTENDO</div>
          <div class="disc-logo-bottom">GAMECUBE</div>
        </div>

        <div class="button button-reset"></div>
        <div class="button button-open">
          <span class="button-open-core"></span>
        </div>

        
            <div class="curved-text">
  <span style="transform: rotate(10deg)">R</span>
  <span style="transform: rotate(20deg)">E</span>
  <span style="transform: rotate(30deg)">S</span>
  <span style="transform: rotate(40deg)">E</span>
  <span style="transform: rotate(50deg)">T</span>
</div>
             <div class="curved-text1">
  <span style="transform: rotate(8deg)">O</span>
  <span style="transform: rotate(17deg)">P</span>
  <span style="transform: rotate(27deg)">E</span>
  <span style="transform: rotate(36deg)">N</span>

</div>
        
    
      </div>
    </section>
  </main>
</body>
</html>
